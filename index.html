<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <aside>
            <div class="logo">
                <p>Odin<img src="images/odin-lined.png" alt="'The Odin Project' logotype."></p>
            </div>
            <footer>
                <p>Photo taken by <em>Author</em> on <em>Source</em>.</p>
            </footer>
        </aside>
        <section>
                <h1>Sign Up</h1>
                
                <h2>This is not a real online service! Yet, it looks just like one. Did you like the looks? Sign up <em>now</em> and enjoy.</h2>
                
                <h2>You <em>know</em> you want to.</h2>
            
            
            <form action="#" method="get">
                <div class="main-form-container">
                    <h2>Just do it!</h2>
                    <!-- Segundo análise do leiaute de referência, isso deveria ser um container de 3 fieldsets, com 2 controles de form. cada.-->
                    <div class="form-control-container">
                        <fieldset>
                            <div class="form-control">
                                <label for="first-name">First name</label>
                                <input type="text" id="first-name" name="first-name" required>
                            </div>
                            
                            <div class="form-control">
                                <label for="last-name">Last name</label>
                                <input type="text" id="last-name" name="last-name" required>
                            </div>
                        </fieldset>
                        <fieldset>
                            <div class="form-control">
                                <label for="user-pwd">Password</label>
                                <input type="password" id="user-pwd" name="password" required>
                            </div>
                            
                            <div class="form-control">
                                <label for="pwd-confrm">Confirm Password</label>
                                <input type="password" id="pwd-confrm" name="pwd-confrm" required>
                            </div>
                        </fieldset>
                    </div>
                    
                </div>
                <div class="second-form-container">
                    <button type="submit">Create Account</button>
                    <p>Already have an account? <a href="#">Log in</a></p>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
